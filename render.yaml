services:
  - type: web
    name: cinescope-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate --schema=backend/prisma/schema.prisma && npm run build --workspace=backend
    startCommand: npm run start --workspace=backend
    preDeployCommand: npx prisma migrate deploy --schema=backend/prisma/schema.prisma
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3333
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
