services:
  postgres:
    image: postgres:16-alpine
    container_name: cinescope-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinescope
      POSTGRES_PASSWORD: cinescope
      POSTGRES_DB: cinescope
    ports:
      - '5432:5432'
    volumes:
      - cinescope_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinescope']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cinescope_pgdata:
